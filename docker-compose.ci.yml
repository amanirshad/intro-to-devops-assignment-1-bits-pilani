# ──────────────────────────────────────────────────────────────────────────────
# Local CI/CD infrastructure for ACEest Fitness & Gym (Assignment 2)
#
# Brings up:
#   * Jenkins LTS  - http://localhost:8080      (build / pipeline server)
#   * SonarQube    - http://localhost:9000      (static code analysis)
#   * PostgreSQL   - internal                    (SonarQube backing store)
#
# Designed for macOS (Apple Silicon) + Docker Desktop with Kubernetes enabled.
# Both Jenkins and SonarQube containers are linked on the `cicd` network so the
# Jenkins SonarQube Scanner stage can reach SonarQube at http://sonarqube:9000.
# ──────────────────────────────────────────────────────────────────────────────

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    platform: linux/arm64        # Apple Silicon native
    container_name: aceest-jenkins
    restart: unless-stopped
    user: root                   # required to mount the host docker socket
    ports:
      - "8080:8080"              # Jenkins UI
      - "50000:50000"            # JNLP agents
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=true"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # build & push images from pipeline
      - ${HOME}/.kube:/root/.kube:ro                # kubectl access to Docker Desktop K8s
    networks:
      - cicd

  sonarqube:
    image: sonarqube:lts-community
    platform: linux/arm64
    container_name: aceest-sonarqube
    restart: unless-stopped
    depends_on:
      - sonar-db
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - cicd

  sonar-db:
    image: postgres:15-alpine
    container_name: aceest-sonar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - cicd

networks:
  cicd:
    driver: bridge

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_db_data:
