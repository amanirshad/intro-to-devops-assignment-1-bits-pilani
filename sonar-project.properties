###############################################################################
# SonarQube project configuration for ACEest Fitness & Gym
# Used by Jenkins SonarQube Scanner stage to perform static analysis
###############################################################################

sonar.projectKey=aceest-fitness
sonar.projectName=ACEest Fitness & Gym
sonar.projectVersion=2.0

# Source / test layout
sonar.sources=app.py
sonar.tests=test_app.py
sonar.language=py
sonar.sourceEncoding=UTF-8

# Python-specific settings
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=pytest-report.xml

# Exclusions (legacy versions kept for traceability only)
sonar.exclusions=code-versions/**,**/__pycache__/**,.venv/**,venv/**

# Quality gate behaviour - fail the pipeline if gate is not green
sonar.qualitygate.wait=true
