name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 app.py --max-line-length=120 --count --show-source --statistics
          flake8 test_app.py --max-line-length=120 --count --show-source --statistics

      - name: Run tests
        run: pytest test_app.py -v

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aceest-fitness:latest .

      - name: Run tests inside container
        run: |
          docker run --rm aceest-fitness:latest pytest test_app.py -v
