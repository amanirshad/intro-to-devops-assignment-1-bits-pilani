# ──────────────────────────────────────────────────────────────────────────────
# Shadow Deployment
#
# Production traffic is served only by the `primary` deployment. A `shadow`
# deployment receives a mirrored copy of requests via a sidecar `tee` proxy
# (nginx mirror) but its responses are discarded. Allows safe production-grade
# load testing of a new version with zero user-visible risk.
#
# Implementation note: nginx `mirror` directive is used to duplicate traffic
# to the shadow Service. Only the primary's response is returned to clients.
# ──────────────────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-primary
  namespace: aceest
  labels: { app: aceest-fitness, role: primary }
spec:
  replicas: 2
  selector:
    matchLabels: { app: aceest-fitness, role: primary }
  template:
    metadata:
      labels: { app: aceest-fitness, role: primary }
    spec:
      containers:
        - name: web
          image: DOCKERHUB_USER/aceest-fitness:v3.0.1
          ports: [{ containerPort: 5000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-shadow
  namespace: aceest
  labels: { app: aceest-fitness, role: shadow }
spec:
  replicas: 2
  selector:
    matchLabels: { app: aceest-fitness, role: shadow }
  template:
    metadata:
      labels: { app: aceest-fitness, role: shadow }
    spec:
      containers:
        - name: web
          image: DOCKERHUB_USER/aceest-fitness:v3.2.4
          ports: [{ containerPort: 5000 }]
---
apiVersion: v1
kind: Service
metadata: { name: aceest-primary-svc, namespace: aceest }
spec:
  selector: { app: aceest-fitness, role: primary }
  ports: [{ port: 5000, targetPort: 5000 }]
---
apiVersion: v1
kind: Service
metadata: { name: aceest-shadow-svc, namespace: aceest }
spec:
  selector: { app: aceest-fitness, role: shadow }
  ports: [{ port: 5000, targetPort: 5000 }]
---
apiVersion: v1
kind: ConfigMap
metadata: { name: aceest-shadow-nginx, namespace: aceest }
data:
  nginx.conf: |
    events {}
    http {
      upstream primary { server aceest-primary-svc:5000; }
      upstream shadow  { server aceest-shadow-svc:5000;  }
      server {
        listen 80;
        location / {
          mirror /shadow;
          mirror_request_body on;
          proxy_pass http://primary;
        }
        location = /shadow {
          internal;
          proxy_pass http://shadow$request_uri;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: aceest-shadow-proxy, namespace: aceest }
spec:
  replicas: 1
  selector: { matchLabels: { app: aceest-shadow-proxy } }
  template:
    metadata: { labels: { app: aceest-shadow-proxy } }
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports: [{ containerPort: 80 }]
          volumeMounts:
            - name: cfg
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: cfg
          configMap: { name: aceest-shadow-nginx }
---
apiVersion: v1
kind: Service
metadata: { name: aceest-shadow-entry, namespace: aceest }
spec:
  type: NodePort
  selector: { app: aceest-shadow-proxy }
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30084
