# ──────────────────────────────────────────────────────────────────────────────
# Rolling Update Deployment
#
# Default Kubernetes strategy. maxSurge=1, maxUnavailable=0 keeps full
# capacity during rollout. `kubectl rollout undo` provides instant rollback
# to the last revision.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-rolling
  namespace: aceest
  labels: { app: aceest-fitness, strategy: rolling }
spec:
  replicas: 4
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: { app: aceest-fitness, strategy: rolling }
  template:
    metadata:
      labels: { app: aceest-fitness, strategy: rolling }
    spec:
      containers:
        - name: web
          image: DOCKERHUB_USER/aceest-fitness:IMAGE_TAG
          ports: [{ containerPort: 5000 }]
          readinessProbe: { httpGet: { path: /, port: 5000 }, periodSeconds: 5 }
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-rolling-svc
  namespace: aceest
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    strategy: rolling
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30083
