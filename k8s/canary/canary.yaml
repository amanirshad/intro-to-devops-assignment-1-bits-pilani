# ──────────────────────────────────────────────────────────────────────────────
# Canary Release
#
# 4 stable replicas + 1 canary replica (≈20% traffic) share a label `app`.
# A single Service load-balances across both, so Kubernetes' kube-proxy gives
# canary roughly replica-share traffic. Promote by scaling stable→0, canary→N.
# Rollback by scaling canary→0.
# ──────────────────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
  namespace: aceest
  labels: { app: aceest-fitness, track: stable }
spec:
  replicas: 4
  selector:
    matchLabels: { app: aceest-fitness, track: stable }
  template:
    metadata:
      labels: { app: aceest-fitness, track: stable }
    spec:
      containers:
        - name: web
          image: DOCKERHUB_USER/aceest-fitness:v3.0.1
          ports: [{ containerPort: 5000 }]
          readinessProbe: { httpGet: { path: /, port: 5000 }, periodSeconds: 5 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
  namespace: aceest
  labels: { app: aceest-fitness, track: canary }
spec:
  replicas: 1
  selector:
    matchLabels: { app: aceest-fitness, track: canary }
  template:
    metadata:
      labels: { app: aceest-fitness, track: canary }
    spec:
      containers:
        - name: web
          image: DOCKERHUB_USER/aceest-fitness:v3.2.4
          ports: [{ containerPort: 5000 }]
          readinessProbe: { httpGet: { path: /, port: 5000 }, periodSeconds: 5 }
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-canary-svc
  namespace: aceest
spec:
  type: NodePort
  selector:
    app: aceest-fitness        # matches BOTH tracks → ~20% to canary
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30082
