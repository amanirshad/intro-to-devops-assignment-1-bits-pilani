# ──────────────────────────────────────────────────────────────────────────────
# Blue-Green Deployment
#
# Two parallel Deployments (blue / green) sit behind a single Service. The
# Service `selector.color` decides which one receives traffic. To cut over,
# patch the Service to point at the other colour. To rollback, patch back.
# ──────────────────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-blue
  namespace: aceest
  labels: { app: aceest-fitness, color: blue }
spec:
  replicas: 2
  selector:
    matchLabels: { app: aceest-fitness, color: blue }
  template:
    metadata:
      labels: { app: aceest-fitness, color: blue }
    spec:
      containers:
        - name: web
          image: DOCKERHUB_USER/aceest-fitness:v2.2.4   # current stable
          ports: [{ containerPort: 5000 }]
          readinessProbe: { httpGet: { path: /, port: 5000 }, periodSeconds: 5 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
  namespace: aceest
  labels: { app: aceest-fitness, color: green }
spec:
  replicas: 2
  selector:
    matchLabels: { app: aceest-fitness, color: green }
  template:
    metadata:
      labels: { app: aceest-fitness, color: green }
    spec:
      containers:
        - name: web
          image: DOCKERHUB_USER/aceest-fitness:v3.2.4   # candidate
          ports: [{ containerPort: 5000 }]
          readinessProbe: { httpGet: { path: /, port: 5000 }, periodSeconds: 5 }
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-bluegreen
  namespace: aceest
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    color: blue                # flip to 'green' to cut traffic over
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30081
